<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Envie suas Fotos Polaroid</title>
</head>
<body>

    <div class="polaroid-card">
        <div class="tape" aria-hidden="true"></div>

        <div class="header">
            <span class="polaroid-icon">📸</span>
            <h1>Envie suas <span>Polaroid</span></h1>
            <div class="divider"></div>
            <p>Preencha os dados abaixo para enviar suas fotos.</p>
        </div>

        <form id="uploadForm" novalidate>
            <!-- Código da compra (obrigatório) -->
            <div class="form-group">
                <label for="orderCode">Código da compra <span class="required">*</span></label>
                <input type="text" id="orderCode" class="input-text" placeholder="Ex: SHOP-1234" required>
                <span class="hint">Código recebido no e-mail ou na plataforma.</span>
            </div>

            <!-- Produto (obrigatório) -->
            <div class="form-group">
                <label for="productSelect">Produto comprado <span class="required">*</span></label>
                <select id="productSelect" class="input-text" required>
                    <!-- Opções inseridas dinamicamente via src/config.js -->
                </select>
            </div>

            <!-- Contato (opcional) -->
            <div class="form-group">
                <label for="contact">Contato <span style="font-weight:normal; color:#8a7a6e;">(opcional)</span></label>
                <input type="text" id="contact" class="input-text" placeholder="E-mail ou WhatsApp">
                <span class="hint">Para entrarmos em contato caso necessário.</span>
            </div>

            <!-- Upload de imagens (obrigatório) -->
            <div class="form-group">
                <label for="fileInput">Envie suas imagens <span class="required">*</span></label>
                <div class="upload-wrapper" id="dropZone">
                    <span class="upload-icon">🖼️</span>
                    <p><strong>Toque ou arraste</strong> suas fotos aqui</p>
                    <span class="file-types">JPG, PNG, WEBP · até 10MB cada</span>
                    <input type="file" id="fileInput" accept="image/*" multiple>
                </div>
                <div id="fileList" class="file-list"></div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn" disabled>
                <span>📤</span> Enviar imagens
            </button>
        </form>

        <div class="footer">
            <p>Suas imagens serão processadas com cuidado.</p>
        </div>
    </div>

    <div id="toast" class="toast">
        <span class="toast-icon">✅</span>
        <span id="toastMessage"></span>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
